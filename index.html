<!DOCTYPE html>
<html>
<head>
    <title>Admission Form</title>
    <link rel="stylesheet" href="C:\Users\ELCOT\Downloads\project\style.css">
</head>
<body>

    <h2>Admission Form</h2>

    <form>

        <label>Full Name:</label><br>
        <input type="text" name="fullname"
        placeholder="Enter your full name" required>
        <br><br>

        <label>Date of Birth:</label><br>
        <input type="date" name="dob" required>
        <br><br>

        <label>Gender:</label><br>
        <input type="radio" name="gender" value="Male" required> Male
        <input type="radio" name="gender" value="Female"> Female
        <input type="radio" name="gender" value="Other"> Other
        <br><br>

        <label>Address:</label><br>
        <textarea name="address" rows="4" cols="30"
        placeholder="Enter your address" required></textarea>
        <br><br>

        <label>Phone Number:</label><br>
        <input type="tel" name="phone"
        placeholder="Enter your phone number" required>
        <br><br>

        <label>Email:</label><br>
        <input type="email" name="email"
        placeholder="Enter your email address" required>
        <br><br>

        <label>Course Applying For:</label><br>
        <select name="course" required>
            <option value="">Select Course</option>
            <option>BCA</option>
            <option>B.Sc Computer Science</option>
            <option>B.Com</option>
            <option>BA English</option>
            <option>MCA</option>
        </select>
        <br><br>

        <label>Previous Qualification:</label><br>
        <input type="text" name="qualification"
        placeholder="Enter your qualification" required>
        <br><br>

        <label>Percentage/Grade:</label><br>
        <input type="text" name="grade"
        placeholder="Enter your percentage or grade" required>
        <br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>
</html>
